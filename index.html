<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Clases de guitarra online y presenciales para todos los niveles.">
  <meta name="keywords" content="guitarra, clases de guitarra, música, guitarra online">
  <meta name="author" content="Lorenzo Leguizamon Rigau">

  <title>Clases de Guitarra</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>

  <div class="logo-titulo">
    <img src="img/logo.png" alt="Logo">

    <h1>Clases de Guitarra</h1>
  </div>

</header>

<nav>
  
  <ul>
    <li><a href="#inicio">Inicio</a></li>
    <li><a href="#productos">Clases</a></li>
    <li><a href="#resenas">Reseñas</a></li>
    <li><a href="#contacto">Contacto</a></li>
    <li>🛒 Carrito: <span id="contador-carrito">0</span></li>
  </ul>
</nav>

<main>

  <!-- INICIO -->
  <section id="inicio">
    <h2>Bienvenido</h2>
    <p>Clases personalizadas online o presenciales.</p>

    <!-- Multimedia -->
   <iframe 
  width="560" 
  height="315" 
  src="https://www.youtube.com/embed/GLDJy5kW-dY"
  title="Clase de guitarra"
  allowfullscreen>
</iframe>
  </section>

  <!-- PRODUCTOS (FLEXBOX) -->
 <section id="productos">
    <h2>Clases</h2>

    <div class="cards container" id="lista-productos"></div>
    </div>
</section>
<section id="carrito">
    <h2>Carrito</h2>

    <div id="items-carrito"></div>

    <h3>Total: $<span id="total">0</span></h3>
</section>

  <!-- RESEÑAS (GRID) -->
  <section id="resenas">
    <h2>Reseñas</h2>

    <div class="grid">
      <div>“Excelente profesor”</div>
      <div>“Aprendí rápido”</div>
      <div>“Muy recomendable”</div>
    </div>
  </section>

  <!-- CONTACTO -->
  <section id="contacto">
    <h2>Contacto</h2>

    <form action="https://formspree.io/f/xvzlakpq" method="POST">
      <input type="text" name="nombre" placeholder="Nombre" required>
      <input type="email" name="email" placeholder="Correo" required>
      <textarea name="mensaje" placeholder="Mensaje"></textarea>
     <button type="submit" class="btn btn-primary">Enviar</button>
    </form>
  </section>

</main>

<footer>
  <p>© 2026 Clases de Guitarra</p>
</footer>

<script src="script.js"></script>

</body>
</html>
